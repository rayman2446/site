<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensortest</title>
<style>
  :root{ --shell:#1b1f2a; --panel:#252b38; --line:#333c4d;
         --text:#e8edf5; --muted:#8b96a8; --flag:#f5a524; }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:var(--shell); color:var(--text);
       font-family:system-ui,sans-serif; display:flex; flex-direction:column;
       align-items:center; padding:24px 16px;}
  h1{font-size:1.1rem; letter-spacing:.1em; text-transform:uppercase;}
  p{color:var(--muted); font-size:.85rem; text-align:center; max-width:320px;}
  button{background:var(--flag); color:#1b1f2a; border:none; border-radius:8px;
         padding:12px 20px; font-size:1rem; font-weight:700; cursor:pointer; margin:8px;}
  .arena{position:relative; width:260px; height:260px; background:var(--panel);
         border:1px solid var(--line); border-radius:14px; margin:18px 0;}
  .dot{position:absolute; width:26px; height:26px; border-radius:50%;
       background:var(--flag); left:117px; top:117px; transition:left .08s,top .08s;}
  .readout{font-family:monospace; font-size:1.1rem; background:#10131a;
           padding:8px 14px; border-radius:8px;}
</style>
</head>
<body>
  <h1>Sensortest</h1>
  <p>Open dit op je <b>smartphone</b>, druk op start en kantel het toestel.</p>
  <button id="start">Sensor starten</button>
  <div class="arena"><div class="dot" id="dot"></div></div>
  <div class="readout" id="readout">beta: — &nbsp; gamma: —</div>

<script>
  const dot = document.getElementById("dot");
  const readout = document.getElementById("readout");

  async function start(){
    // iOS 13+ vereist expliciete toestemming, na een knopdruk en via HTTPS
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"){
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== "granted"){ readout.textContent = "Toestemming geweigerd"; return; }
    }
    window.addEventListener("deviceorientation", onTilt);
    readout.textContent = "Sensor actief — kantel je toestel";
  }

  function onTilt(e){
    const beta  = e.beta  || 0;   // voor/achter kantelen (-180..180)
    const gamma = e.gamma || 0;   // links/rechts kantelen (-90..90)
    readout.textContent = "beta: " + beta.toFixed(0) + "  gamma: " + gamma.toFixed(0);

    // kanteling omzetten naar een positie binnen het vlak (260px, stip 26px)
    const x = Math.max(0, Math.min(234, 117 + gamma * 2.6));
    const y = Math.max(0, Math.min(234, 117 + (beta - 45) * 2.6));
    dot.style.left = x + "px";
    dot.style.top  = y + "px";
  }

  document.getElementById("start").addEventListener("click", start);
</script>
</body>
</html>
